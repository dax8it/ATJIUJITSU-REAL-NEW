<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>@JiuJitsuNYC Content Manager</title>
  </head>
  <body>
    <style>
      .atjj-training-link {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 2147483647;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 11px 14px;
        border-radius: 999px;
        background: #e11d2f;
        color: #fff;
        font: 800 14px/1.1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-decoration: none;
        box-shadow: 0 14px 42px rgba(0, 0, 0, 0.28);
      }
    </style>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      function ensureTrainingLink() {
        if (!window.netlifyIdentity || !window.netlifyIdentity.currentUser()) return;
        if (document.querySelector(".atjj-training-link")) return;
        const link = document.createElement("a");
        link.className = "atjj-training-link";
        link.href = "/admin/training/";
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = "Update guide + video";
        document.body.appendChild(link);
      }

      function removeTrainingLink() {
        document.querySelectorAll(".atjj-training-link").forEach(link => link.remove());
      }

      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            removeTrainingLink();
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
            return;
          }

          ensureTrainingLink();
          setInterval(ensureTrainingLink, 2000);
        });

        window.netlifyIdentity.on("logout", removeTrainingLink);
      }
    </script>
  </body>
</html>
